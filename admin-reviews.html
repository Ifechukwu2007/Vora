<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Vora | Reviews</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { display: none !important; }
  body.authorized { display: flex !important; }
</style>
</head>

<body class="flex h-screen bg-gray-100 overflow-hidden">

<!-- SIDEBAR -->
<aside class="w-64 bg-white border-r flex flex-col">
  <div class="p-4 font-bold border-b">🔥 Vora Console</div>

  <nav class="flex-1 p-2 space-y-1 overflow-y-auto">
    <a href="admin" class="block p-2 bg-gray-100 rounded">overview</a>
    <a href="admin-users" class="block p-2 hover:bg-gray-100 rounded">users</a>
    <a href="admin-requests" class="block p-2 hover:bg-gray-100 rounded">requests</a>
    <a href="admin-offers" class="block p-2 hover:bg-gray-100 rounded">offers</a>
    <a href="admin-services" class="block p-2 hover:bg-gray-100 rounded">services</a>
    <a href="admin-bookings" class="block p-2 hover:bg-gray-100 rounded">bookings</a>
    <a href="admin-messages" class="block p-2 hover:bg-gray-100 rounded">messages</a>
    <a href="admin-payments" class="block p-2 hover:bg-gray-100 rounded">payments</a>
    <a href="admin-chats" class="block p-2 hover:bg-gray-100 rounded">chats</a>
    <a href="admin-payouts" class="block p-2 hover:bg-gray-100 rounded">payouts</a>
    <a href="admin-reviews" class="block p-2 hover:bg-gray-100 rounded">reviews</a>
    <a href="admin-settings" class="block p-2 hover:bg-gray-100 rounded">settings</a>
  </nav>

  <a href="home" class="p-4 border-t text-sm">← Back</a>
</aside>

<!-- MAIN -->
<div class="flex-1 flex flex-col">

<!-- TOP BAR -->
<header class="bg-white border-b px-6 py-3 flex justify-between items-center">
  <div class="font-semibold">Reviews</div>

  <div class="flex gap-2">
    <input id="search" placeholder="Search reviews..." class="border px-3 py-1 rounded text-sm" />
    <button onclick="addSampleReview()" class="bg-blue-500 text-white px-3 py-1 rounded text-sm text-xs">
      📝 Sample
    </button>
  </div>
</header>

<!-- BODY -->
<div class="flex flex-1 overflow-hidden">

<!-- TABLE -->
<div class="flex-1 overflow-auto p-4">
  <div class="grid grid-cols-6 font-semibold text-sm border-b pb-2">
    <div>Reviewer</div>
    <div>Service</div>
    <div>Rating</div>
    <div>Comment</div>
    <div>Date</div>
    <div>Actions</div>
  </div>

  <div id="tableBody"></div>
</div>

<!-- DOCUMENT PANEL -->
<div id="panel" class="w-96 bg-white border-l p-4 hidden flex flex-col">
  <h3 class="font-semibold mb-2">Review Document</h3>

  <textarea id="editor" class="flex-1 border p-2 text-xs font-mono rounded"></textarea>

  <div class="flex gap-2 mt-3">
    <button id="save" class="bg-black text-white px-3 py-1 rounded">Save</button>
    <button id="delete" class="bg-red-500 text-white px-3 py-1 rounded">Delete</button>
  </div>
</div>

</div>
</div>

<script src="firebase-config.js"></script>
<script src="admin-reviews.js" type="module"></script>
<script src="./loading-utils.js" type="module"></script>
<script type="module">
  import { supabase } from './supabase.js'

  console.log(supabase)
</script>
</body>
</html>
