<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Vora Chat</title>
<link rel="icon" type="image/svg+xml" href="/vora-logo.svg">
<link rel="icon" type="image/png" sizes="512x512" href="/vora-logo.svg">
<link rel="shortcut icon" href="/vora-logo.svg">
<link rel="apple-touch-icon" href="/vora-logo.svg">
<link rel="manifest" href="/manifest.json">

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    #chatBox::-webkit-scrollbar {
      width: 6px;
    }

    #chatBox::-webkit-scrollbar-track {
      background: #f1f5f9;
    }

    #chatBox::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 10px;
    }

    #chatBox::-webkit-scrollbar-thumb:hover {
      background: #94a3b8;
    }

    #chatBox {
      scroll-behavior: smooth;
    }

    .message-bubble {
      animation: slideIn 0.3s ease-out;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .typing-indicator {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 8px 12px;
      background: #f0f0f0;
      border-radius: 18px;
      width: fit-content;
    }

    .typing-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #999;
      animation: typing 1.4s infinite;
    }

    .typing-dot:nth-child(2) {
      animation-delay: 0.2s;
    }

    .typing-dot:nth-child(3) {
      animation-delay: 0.4s;
    }

    @keyframes typing {
      0%, 60%, 100% {
        opacity: 0.5;
        transform: translateY(0);
      }
      30% {
        opacity: 1;
        transform: translateY(-10px);
      }
    }
  </style>
</head>

<body class="bg-gray-50 h-screen flex flex-col">

  <!-- ================= HEADER ================= -->
  <header class="bg-white border-b border-gray-200 shadow-sm">
    <div class="max-w-6xl mx-auto px-4 py-4 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <!-- BACK BUTTON -->
        <!-- Back icon button -->
<button id="icon-back" aria-label="Go back" title="Back" style="
  display:inline-flex;
  align-items:center;
  justify-content:center;
  width:40px;
  height:40px;
  border-radius:8px;
  border:1px solid #ddd;
  background:#fff;
  cursor:pointer;
  padding:0;
">
  <!-- simple left chevron SVG -->
  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
    <path d="M15 18L9 12L15 6" stroke="#111" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>
</button>

<script>
  // Robust back behavior with returnUrl fallback
  (function(){
    const btn = document.getElementById('icon-back');
    function getParam(name) {
      try {
        const p = new URLSearchParams(window.location.search);
        return p.get(name);
      } catch (e) {
        return null;
      }
    }
    const returnUrl = getParam('returnUrl');

    btn.addEventListener('click', () => {
      if (window.history && window.history.length > 1) {
        window.history.back();
        return;
      }
      if (returnUrl) {
        window.location.href = returnUrl;
        return;
      }
      if (document.referrer && document.referrer !== window.location.href) {
        window.location.href = document.referrer;
        return;
      }
      window.location.href = '/my-bookings.html';
    });
  })();
</script>
        <div>
          <h1 id="other-user-name" class="text-lg font-bold text-gray-800">Loading...</h1>
          <p id="service-title" class="text-sm text-gray-500">Direct Message</p>
        </div>
      </div>
      <button id="logoutBtn" class="bg-red-600 hover:bg-red-700 text-white px-4 py-2 rounded-lg font-semibold transition">
        Logout
      </button>
    </div>
  </header>

  <!-- ================= CHAT AREA ================= -->
  <div id="chatBox" class="flex-1 overflow-y-auto p-4 max-w-6xl mx-auto w-full space-y-3">
    <div class="text-center text-gray-400 py-8">
      <p class="text-sm">Loading messages...</p>
    </div>
  </div>

  <!-- ================= INPUT AREA ================= -->
  <div class="bg-white border-t border-gray-200 shadow-lg">
    <div class="max-w-6xl mx-auto px-4 py-4">
      <!-- Typing Indicator -->
      <div id="typingIndicator" class="hidden mb-2">
        <p class="text-sm text-gray-500 flex items-center gap-1">
          <span id="typingUser">User</span> is typing
          <span class="typing-indicator ml-1">
            <span class="typing-dot"></span>
            <span class="typing-dot"></span>
            <span class="typing-dot"></span>
          </span>
        </p>
      </div>
      
      <!-- Message Input -->
      <div class="flex gap-3">
        <input
          type="text"
          id="messageInput"
          placeholder="Type your message..."
          class="flex-1 border border-gray-300 rounded-lg px-4 py-3 outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
          autocomplete="off"
        />

        <button
          id="sendBtn"
          class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded-lg font-semibold transition disabled:bg-gray-400 disabled:cursor-not-allowed"
        >
          Send
        </button>
      </div>
    </div>
  </div>

  <!-- ================= SCRIPTS ================= -->
  <script src="./supabase.js" type="module"></script>
  <script src="./auth.js" type="module"></script>
  <script src="./loading-utils.js" type="module"></script>
  <script src="./chat.js" type="module"></script>
  <script src="./message-realtime-service.js" type="module"></script>
  <script src="./chat-ui.js" type="module"></script>
  <script src="./notification-service.js" type="module"></script>

</body> 
</html>
