<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat | Vora</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="flex flex-col h-screen bg-gray-100">

<body class="bg-gray-100">

<!-- ================= HEADER ================= -->
<header class="fixed top-0 left-0 w-full bg-white border-b border-gray-200 z-50">

  <div class="max-w-7xl mx-auto px-4">

    <div class="flex items-center justify-between h-16">

      <!-- LEFT -->
      <div class="flex items-center gap-10">

        <!-- LOGO -->
        <a href="home.html"
          class="text-2xl font-extrabold text-blue-600">
          Vora
        </a>

        <!-- DESKTOP NAV -->
        <nav class="hidden lg:flex items-center gap-6">

          <a href="home.html"
            class="font-semibold text-black-600">
            Home
          </a>

          <a href="browse.html"
            class="block font-semibold text-black-800">
            Browse
          </a>

          <a href="my-messages.html"
            class="block font-semibold text-black-800">
            My Messages
          </a>

    <a href="browse-pool.html"
            class="block font-semibold text-black-800">
            Request Pool
          </a>

          <a href="add-service.html"
            class="block font-semibold text-black-800">
            Become a Provider
          </a>

        </nav>

      </div>

      <!-- RIGHT -->
      <div class="flex items-center gap-4">

        <!-- NOTIFICATIONS -->
        <a href="notifications.html"
          class="relative text-2xl hover:scale-110 transition">

          🔔

          <span id="notificationBadge"
            class="hidden absolute -top-2 -right-2
            bg-red-600 text-white text-xs rounded-full
            w-5 h-5 flex items-center justify-center">
            0
          </span>

        </a>

        <!-- PROFILE -->
        <a href="profile.html"
          class="w-10 h-10 rounded-full bg-gray-300
          flex items-center justify-center
          hover:bg-gray-400 transition">

          👤

        </a>

        <!-- LOGOUT -->
        <button id="logoutBtn"
          class="hidden lg:block text-red-600 font-semibold hover:text-red-800 transition">
          Logout
        </button>

        <!-- MOBILE MENU -->
        <button id="hamburger"
          class="lg:hidden text-2xl">
          ☰
        </button>

      </div>

    </div>

  </div>

</header>

<!-- ================= MOBILE MENU ================= -->
<div id="sideMenu"
  class="fixed top-0 left-0 h-full w-72 bg-white shadow-lg z-50
  transform -translate-x-full transition-transform duration-300 overflow-y-auto lg:hidden">

  <!-- TOP -->
  <div class="flex items-center justify-between p-4 border-b">

    <h2 class="text-xl font-bold">
      Menu
    </h2>

    <button id="closeMenu" class="text-2xl">
      ✕
    </button>

  </div>

  <!-- LINKS -->
  <div class="p-4 space-y-5">

    <a href="home.html"
      class="block font-semibold text-black-800">
      Home
    </a>

    <a href="browse.html"
      class="block font-semibold text-black-800">
      Browse
    </a>

    <a href="my-messages.html"
      class="block font-semibold text-black-800">
      My Messages
    </a>

    <a href="browse-pool.html"
      class="block font-semibold text-black-800">
      Request Pool
    </a>

    <a href="add-service.html"
      class="block font-semibold text-black-800">
      Become a Provider
    </a>

    <button id="logoutBtnSideMenu"
      class="block text-red-600 font-semibold">
      Logout
    </button>

  </div>

</div>

<!-- ================= OVERLAY ================= -->
<div id="menuOverlay"
  class="hidden fixed inset-0 bg-black bg-opacity-40 z-40 lg:hidden">
</div>

    <!-- Main Chat Area -->
    <main class="pt-24 px-4 max-w-4xl mx-auto">
    </main>
        <!-- Chat Context Header -->
        <div id="chat-context-header" class="bg-white border-b border-gray-200 p-4 z-10">
                <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>                <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><button id="backBtn" type="button" onclick="window.history.back()"
          class="text-blue-600 hover:text-blue-800 font-semibold">
          ← Back
        </button>
             <h2 id="service-title" class="text-lg font-bold text-center text-gray-800">Loading...</h2>
             <p id="other-user-name" class="text-sm text-gray-500 text-center"></p>
        </div>
        
        <!-- Messages Container -->
        <div id="chat-container" class="flex-1 overflow-y-auto p-4">
            <!-- Messages will be loaded here -->
        </div>
    </main>

    <!-- Message Input Footer -->
    <footer class="bg-white p-4 border-t border-gray-200">
        <div class="flex items-center">
            <input type="text" id="message-input" placeholder="Type a message..." class="flex-1 p-3 border rounded-full focus:outline-none focus:ring-2 focus:ring-blue-500 px-5">
            <button id="send-button" class="ml-3 bg-blue-600 text-white rounded-full px-6 py-3 font-semibold hover:bg-blue-700 transition-colors">Send</button>
        </div>
    </footer>

    <script src="./firebase-config.js" type="module"></script>
    <script src="./auth.js" type="module"></script>
    <script src="./chat.js" type="module"></script>
    <script src="./menu.js" type="module"></script>
    <script src="./main.js" type="module"></script>
    <script src="./notifications.js" type="module"></script>
    <script src="./notification-service.js" type="module"></script>
    <script src="./notification-badge.js" type="module"></script>
    
</body>
</html>
