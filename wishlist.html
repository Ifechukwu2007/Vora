<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>My Wishlist | Vora</title>

<script src="https://cdn.tailwindcss.com"></script>
<link rel="icon" type="image/svg+xml" href="/vora-logo.svg">
<link rel="icon" type="image/png" sizes="512x512" href="/vora-logo.svg">
<link rel="shortcut icon" href="/vora-logo.svg">
<link rel="apple-touch-icon" href="/vora-logo.svg">
<link rel="manifest" href="/manifest.json">
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-900">

</head>

<!-- ================= HEADER ================= -->
<header class="fixed top-0 left-0 w-full bg-white border-b border-gray-200 z-50">

  <div class="max-w-7xl mx-auto px-4">

    <div class="flex items-center justify-between h-16">

      <!-- LEFT -->
      <div class="flex items-center gap-10">
        <a href="home.html" class="flex items-center gap-2">
          <img src="/vora-logo.svg" alt="Vora Logo" class="h-10 w-auto" onerror="this.style.display='none'">
          <span class="text-2xl font-extrabold text-blue-600">Vora</span>
        </a>

        <nav class="hidden lg:flex items-center gap-5 text-sm font-medium text-slate-700">
          <a href="home.html" class="transition hover:text-slate-900">Home</a>
          <a href="my-bookings.html" class="transition hover:text-slate-900">My Bookings</a>
          <a href="my-messages.html" class="transition hover:text-slate-900">My Messages</a>
          <a href="wishlist.html" class="transition hover:text-slate-900">Wishlist</a>
        </nav>

      </div>

      <!-- RIGHT -->
      <div class="flex items-center gap-4">

        <!-- PROFILE -->
        <a href="profile.html"
          data-profile-icon="true"
          class="w-10 h-10 rounded-full bg-gray-300
          flex items-center justify-center
          hover:bg-gray-400 transition">

          👤

        </a>

        <!-- LOGOUT -->
        <button id="logoutBtn-payout-settings" data-logout
          class="hidden lg:block text-red-600 font-semibold hover:text-red-800 transition">
          Logout
        </button>

        <!-- MOBILE MENU -->
        <button id="hamburger"
          class="lg:hidden text-2xl">
          ☰
        </button>

      </div>

    </div>

  </div>

</header>

<!-- ================= MOBILE MENU ================= -->
<div id="sideMenu" data-paystack="true"
  class="fixed top-0 left-0 h-full w-72 bg-slate-900 text-white z-50
  transform -translate-x-full transition-transform duration-300 overflow-y-auto lg:hidden">

  <div class="flex items-center justify-between p-4 border-b border-slate-800">
    <div class="flex items-center gap-3">
      <img src="/vora-logo.svg" class="h-8 w-auto" alt="Vora" onerror="this.style.display='none'">
      <span class="font-bold">Vora</span>
    </div>
    <button id="closeMenu" class="text-2xl">✕</button>
  </div>

  <nav class="p-4 space-y-1">
    <a href="home.html" class="flex items-center gap-3 p-3 rounded-md hover:bg-slate-800">
      <span class="text-lg">🏠</span>
      <span>Home</span>
    </a>
    <a href="my-bookings.html" class="flex items-center gap-3 p-3 rounded-md hover:bg-slate-800">
      <span class="text-lg">📥</span>
      <span>My Bookings</span>
    </a>
    <a href="my-messages.html" class="flex items-center gap-3 p-3 rounded-md hover:bg-slate-800">
      <span class="text-lg">💬</span>
      <span>My Messages</span>
    </a>
    <a href="wishlist.html" class="flex items-center gap-3 p-3 rounded-md hover:bg-slate-800">
      <span class="text-lg">❤️</span>
      <span>My Wishlist</span>
    </a>
    <button id="logoutBtnSideMenu" class="w-full rounded-full border border-red-600 px-4 py-2 text-sm font-semibold text-red-600 hover:bg-red-50">Logout</button>

    <div class="pt-4 border-t border-slate-800">
    </div>
  </nav>

</div>

<body class="bg-gray-100">

<header class="bg-white shadow">

<div class="max-w-7xl mx-auto px-6 py-5 flex justify-between items-center">

<h1 class="text-3xl font-bold text-blue-600">

My Wishlist

</h1>

<a
href="browse.html"
class="text-blue-600 font-semibold">

Continue Browsing

</a>

</div>

</header>

<main class="max-w-7xl mx-auto p-6">

<div
id="wishlistGrid"
class="grid gap-6 grid-cols-1 sm:grid-cols-2 lg:grid-cols-3">

<div class="text-center col-span-full text-gray-500">

Loading wishlist...

</div>

</div>

</main>

  <script type="module" src="wishlist.js"></script>
  <script src="./auth.js" type="module"></script>
  <script src="./menu.js" type="module"></script>
  <script src="./router.js" type="module"></script>
  <script src="./notifications.js" type="module"></script>
  <script src="./notification-service.js" type="module"></script>
  <script src="./notification-badge.js" type="module"></script>
  <script src="./loading-utils.js" type="module"></script>

</body>
</html>
