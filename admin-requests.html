<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Admin - Requests | Vora</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { display: none !important; }
  body.authorized { display: flex !important; }
</style>
</head>

<body class="flex h-screen bg-gray-100 overflow-hidden">

<!-- SIDEBAR -->
<aside class="w-64 bg-white border-r flex flex-col">
  <div class="p-4 font-bold border-b">🔥 Vora Console</div>

  <nav class="flex-1 p-2 space-y-1 overflow-y-auto">
    <a href="admin.html" class="block p-2 bg-gray-100 rounded">overview</a>
    <a href="admin-users.html" class="block p-2 hover:bg-gray-100 rounded">users</a>
    <a href="admin-requests.html" class="block p-2 hover:bg-gray-100 rounded">requests</a>
    <a href="admin-offers.html" class="block p-2 hover:bg-gray-100 rounded">offers</a>
    <a href="admin-services.html" class="block p-2 hover:bg-gray-100 rounded">services</a>
    <a href="admin-bookings.html" class="block p-2 hover:bg-gray-100 rounded">bookings</a>
    <a href="admin-messages.html" class="block p-2 hover:bg-gray-100 rounded">messages</a>
    <a href="admin-payments.html" class="block p-2 hover:bg-gray-100 rounded">payments</a>
    <a href="admin-chats.html" class="block p-2 hover:bg-gray-100 rounded">chats</a>
    <a href="admin-payouts.html" class="block p-2 hover:bg-gray-100 rounded">payouts</a>
    <a href="admin-reviews.html" class="block p-2 hover:bg-gray-100 rounded">reviews</a>
    <a href="admin-settings.html" class="block p-2 hover:bg-gray-100 rounded">settings</a>
  </nav>

  <a href="home.html" class="p-4 border-t text-sm">← Back</a>
</aside>

<!-- MAIN -->
<div class="flex-1 flex flex-col">

<!-- TOP BAR -->
<header class="bg-white border-b px-6 py-3 flex justify-between items-center">
  <h1 class="font-semibold">Service Requests</h1>
  <div class="flex gap-2">
    <input type="text" id="searchInput" placeholder="Search..." class="px-4 py-2 border rounded">
    <select id="statusFilter" class="px-4 py-2 border rounded">
      <option value="">All Status</option>
      <option value="open">Open</option>
      <option value="accepted">Accepted</option>
      <option value="completed">Completed</option>
    </select>
  </div>
</header>

<!-- CONTENT -->
<div class="p-6 overflow-auto">
  
  <!-- STATS -->
  <div class="grid md:grid-cols-4 gap-4 mb-6">
    <div class="bg-white p-4 rounded-xl">
      <p class="text-gray-500 text-sm">Total Requests</p>
      <h2 id="totalRequests" class="text-xl font-bold">0</h2>
    </div>

    <div class="bg-white p-4 rounded-xl">
      <p class="text-gray-500 text-sm">Open</p>
      <h2 id="openRequests" class="text-xl font-bold text-yellow-600">0</h2>
    </div>

    <div class="bg-white p-4 rounded-xl">
      <p class="text-gray-500 text-sm">Accepted</p>
      <h2 id="acceptedRequests" class="text-xl font-bold text-green-600">0</h2>
    </div>

    <div class="bg-white p-4 rounded-xl">
      <p class="text-gray-500 text-sm">Completed</p>
      <h2 id="completedRequests" class="text-xl font-bold text-blue-600">0</h2>
    </div>
  </div>

  <!-- REQUESTS TABLE -->
  <div class="bg-white rounded-xl overflow-hidden">
    <table class="w-full">
      <thead class="bg-gray-50 border-b">
        <tr>
          <th class="px-6 py-3 text-left text-sm font-semibold">Service Type</th>
          <th class="px-6 py-3 text-left text-sm font-semibold">Location</th>
          <th class="px-6 py-3 text-left text-sm font-semibold">Budget</th>
          <th class="px-6 py-3 text-left text-sm font-semibold">User</th>
          <th class="px-6 py-3 text-left text-sm font-semibold">Status</th>
          <th class="px-6 py-3 text-left text-sm font-semibold">Created</th>
          <th class="px-6 py-3 text-left text-sm font-semibold">Action</th>
        </tr>
      </thead>
      <tbody id="requestsTable" class="divide-y">
        <tr>
          <td class="px-6 py-4 text-gray-500">Loading...</td>
        </tr>
      </tbody>
    </table>
  </div>

</div>
</div>

<!-- DETAIL MODAL -->
<div id="detailModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
  <div class="bg-white rounded-lg p-6 max-w-2xl w-full mx-4 max-h-96 overflow-y-auto">
    <div class="flex justify-between items-start mb-4">
      <h2 class="text-2xl font-bold">Request Details</h2>
      <button onclick="closeDetailModal()" class="text-gray-400 hover:text-gray-600 text-2xl">✕</button>
    </div>
    <div id="detailContent" class="space-y-4"></div>
    <div class="flex gap-2 mt-6 border-t pt-4">
      <button onclick="editRequest()" class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700">Edit</button>
      <button onclick="deleteRequest()" class="px-4 py-2 bg-red-600 text-white rounded hover:bg-red-700">Delete</button>
      <button onclick="closeDetailModal()" class="px-4 py-2 bg-gray-300 text-gray-800 rounded hover:bg-gray-400 ml-auto">Close</button>
    </div>
  </div>
</div>

<!-- EDIT MODAL -->
<div id="editModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
  <div class="bg-white rounded-lg p-6 max-w-2xl w-full mx-4 max-h-96 overflow-y-auto">
    <div class="flex justify-between items-start mb-4">
      <h2 class="text-2xl font-bold">Edit Request</h2>
      <button onclick="closeEditModal()" class="text-gray-400 hover:text-gray-600 text-2xl">✕</button>
    </div>
    <div class="space-y-4" id="editContent"></div>
    <div class="flex gap-2 mt-6 border-t pt-4">
      <button onclick="saveRequest()" class="px-4 py-2 bg-green-600 text-white rounded hover:bg-green-700">Save</button>
      <button onclick="closeEditModal()" class="px-4 py-2 bg-gray-300 text-gray-800 rounded hover:bg-gray-400 ml-auto">Cancel</button>
    </div>
  </div>
</div>

<script src="firebase-config.js"></script>
<script src="./admin-requests.js" type="module"></script>

<script src="./loading-utils.js" type="module"></script>
</body>
</html>
