<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Service | Vora</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-50">

    <header class="fixed top-0 left-0 w-full bg-white shadow z-50 flex items-center justify-between p-4">
        <h1 class="text-xl font-bold">
           <a href="home.html"
          class="text-2xl font-extrabold text-blue-600">
          Vora
        </a>
        </h1>
        <div class="md:hidden flex items-center gap-4">
            <a href="notifications.html" class="relative w-8 h-8 hover:text-blue-600">
              🔔
              <span id="notificationBadgeMobile" class="hidden absolute -top-2 -right-2 bg-red-600 text-white text-xs rounded-full w-5 h-5 flex items-center justify-center">0</span>
            </a>
            <a href="profile.html" class="w-8 h-8 bg-gray-300 rounded-full flex items-center justify-center">👤</a>
        </div>
        <nav class="hidden md:flex space-x-4 items-center">
            <a href="notifications.html" class="relative w-8 h-8 hover:text-blue-600">
              🔔
              <span id="notificationBadge" class="hidden absolute -top-2 -right-2 bg-red-600 text-white text-xs rounded-full w-5 h-5 flex items-center justify-center">0</span>
            </a>
            <a href="profile.html" class="w-8 h-8 bg-gray-300 rounded-full flex items-center justify-center">👤</a>
        </nav>
    </header>

            <!-- Main -->

    <main class="pt-24 max-w-4xl mx-auto py-12 px-4">
        <div class="mb-6 flex items-center gap-4">
                          <!-- BACK BUTTON -->
        <button id="backBtn" type="button" onclick="window.history.back()"
          class="text-blue-600 hover:text-blue-800 font-semibold">
          ← Back
        </button>
            <h1 class="text-3xl font-extrabold text-gray-900">Set up your business</h1>
        </div>
        <form id="add-service-form" class="bg-white p-8 rounded-lg shadow-lg space-y-6">
  
            <div>
                <label for="service-title" class="block text-sm font-medium text-gray-700">Service Title</label>
                <input type="text" id="service-title" name="service-title" required class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-md shadow-sm focus:ring-indigo-500 focus:border-indigo-500">
            </div>

            <div>
                <label for="service-description" class="block text-sm font-medium text-gray-700">Description</label>
                <textarea id="service-description" name="service-description" rows="4" required class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-md shadow-sm focus:ring-indigo-500 focus:border-indigo-500"></textarea>
            </div>

            <div>
                <label for="service-category" class="block text-sm font-medium text-gray-700">Category</label>
                <select id="service-category" name="service-category" required class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-md shadow-sm focus:ring-indigo-500 focus:border-indigo-500">
                    <option value="">Select a category</option>
                    <option value="Home Services">Home Services</option>
                    <option value="Repairs & Maintenance">Repairs & Maintenance</option>
                    <option value="Construction & Real Estate">Construction & Real Estate</option>
                    <option value="Cleaning Services">Cleaning Services</option>
                    <option value="Beauty & Personal Care">Beauty & Personal Care</option>
                    <option value="Health & Medical">Health & Medical</option>
                    <option value="Mental Health & Wellness">Mental Health & Wellness</option>
                    <option value="Fitness & Sports">Fitness & Sports</option>
                    <option value="Food & Catering">Food & Catering</option>
                    <option value="Groceries & Delivery">Groceries & Delivery</option>
                    <option value="Emergency Services">Emergency Services</option>
                    <option value="Transportation & Logistics">Transportation & Logistics</option>
                    <option value="Automotive Services">Automotive Services</option>
                    <option value="Travel & Tourism">Travel & Tourism</option>
                    <option value="Technology & IT">Technology & IT</option>
                    <option value="Software & Development">Software & Development</option>
                    <option value="Electronics & Gadgets">Electronics & Gadgets</option>
                    <option value="Education & Tutoring">Education & Tutoring</option>
                    <option value="Student Services">Student Services</option>
                    <option value="Business & Finance">Business & Finance</option>
                    <option value="Banking & Payments">Banking & Payments</option>
                    <option value="Legal Services">Legal Services</option>
                    <option value="Government & Documentation">Government & Documentation</option>
                    <option value="Marketing & Advertising">Marketing & Advertising</option>
                    <option value="Photography & Videography">Photography & Videography</option>
                    <option value="Media & Entertainment">Media & Entertainment</option>
                    <option value="Music & Events">Music & Events</option>
                    <option value="Fashion & Apparel">Fashion & Apparel</option>
                    <option value="Jewelry & Accessories">Jewelry & Accessories</option>
                    <option value="Agriculture & Farming">Agriculture & Farming</option>
                    <option value="Pets & Animal Care">Pets & Animal Care</option>
                    <option value="Childcare & Parenting">Childcare & Parenting</option>
                    <option value="Elderly Care">Elderly Care</option>
                    <option value="Security Services">Security Services</option>
                    <option value="Religious & Spiritual">Religious & Spiritual</option>
                    <option value="Environment & Waste Management">Environment & Waste Management</option>
                    <option value="Manufacturing & Industrial">Manufacturing & Industrial</option>
                    <option value="Freelance & Remote Services">Freelance & Remote Services</option>
                    <option value="Luxury Services">Luxury Services</option>
                    <option value="Community & Social Services">Community & Social Services</option>
                    <option value="Gaming & Esports">Gaming & Esports</option>
                    <option value="Dating & Relationship Services">Dating & Relationship Services</option>
                    <option value="Art & Design">Art & Design</option>
                    <option value="Printing & Publishing">Printing & Publishing</option>
                    <option value="Rental Services">Rental Services</option>
                    <option value="Storage & Warehousing">Storage & Warehousing</option>
                    <option value="Research & Consulting">Research & Consulting</option>
                    <option value="Other Services">Other Services</option>
                </select>
            </div>

            <div>
                <label for="service-price" class="block text-sm font-medium text-gray-700">Price (NGN)</label>
                <input type="number" id="service-price" name="service-price" required class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-md shadow-sm focus:ring-indigo-500 focus:border-indigo-500">
            </div>

            <div>
                <label for="service-location" class="block text-sm font-medium text-gray-700">Location</label>
                <input type="text" id="service-location" name="service-location" required class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-md shadow-sm focus:ring-indigo-500 focus:border-indigo-500" placeholder="e.g., Lagos, NG">
            </div>

            <div class="flex justify-end">
                <button type="submit" class="py-3 px-8 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500">Add Service</button>
            </div>
        </form>
    </main>

    <script src="./firebase-config.js" type="module"></script>
    <script src="./add-service.js" type="module"></script>
    <script src="./menu.js" type="module"></script>

</body>
</html>
