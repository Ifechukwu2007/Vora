<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Booking Confirmed | Vora</title>
  <link rel="icon" type="image/svg+xml" href="/vora-logo.svg">
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-slate-50 text-slate-900">
  <main class="mx-auto max-w-3xl px-4 py-20 text-center">
    <div class="inline-flex items-center justify-center rounded-3xl bg-emerald-100 px-4 py-3 text-emerald-900 mb-8">
      <span class="text-2xl mr-2">✅</span>
      <span class="font-semibold">Booking confirmed</span>
    </div>
    <h1 class="text-4xl font-bold mb-4">Your booking is all set</h1>
    <p class="text-lg text-slate-700 mb-8">Your payment was received and your booking has been confirmed. You can view it anytime from your bookings page.</p>
    <p class="text-sm text-slate-500 mb-6">Booking ID: <span id="booking-id-text">-</span></p>
    <div class="grid gap-4 sm:grid-cols-2">
      <a href="my-bookings.html" class="rounded-3xl bg-slate-900 px-6 py-3 text-white font-semibold hover:bg-slate-800">My Bookings</a>
      <a href="home.html" class="rounded-3xl border border-slate-300 px-6 py-3 text-slate-900 font-semibold hover:bg-slate-800 hover:text-white">Back to Home</a>
    </div>
  </main>
  <script>
    const params = new URLSearchParams(window.location.search);
    const bookingId = params.get('bookingId');
    const refEl = document.getElementById('booking-id-text');
    if (refEl && bookingId) {
      refEl.textContent = bookingId;
    }
  </script>
</body>
</html>
