    points="160,220 320,220 420,520 300,620"
    fill="#6FBF73"/>

  <!-- Right V -->
  <polygon
    points="480,220 640,520 560,760 360,760 260,520"
    fill="#FFA31A"/>

  <!-- White connection path -->
  <path
    d="M310 520
       C340 470 340 430 370 410
       C400 390 440 420 490 410
       C540 400 570 350 610 320"
    stroke="white"
    stroke-width="45"
    fill="none"
    stroke-linecap="round"/>

  <!-- Customer circle -->
  <circle
    cx="385"
    cy="420"
    r="22"
    fill="#FFA31A"/>

  <!-- Provider circle -->
  <circle
    cx="590"
    cy="320"
    r="12"
    fill="#6FBF73"/>

  <!-- Location pin -->
  <path
    d="M590 120
       C540 120 500 160 500 210
       C500 270 590 360 590 360
       C590 360 680 270 680 210
       C680 160 640 120 590 120 Z"
    fill="#FF0000"/>

  <!-- Pin hole -->
  <circle
    cx="590"
    cy="210"
    r="28"
    fill="white"/>

</svg>